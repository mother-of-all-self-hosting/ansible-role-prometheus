---
- name: Include roles for Prometheus Molecule tests
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Include roles for Prometheus Molecule tests
      ansible.builtin.include_role:
        name: "{{ role_name }}"
        public: true
      loop:
        - com.devture.ansible.role.playbook_help
        - com.devture.ansible.role.systemd_docker_base
        - "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | basename }}"
      loop_control:
        loop_var: role_name

- name: Ensure Prometheus service is started
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Ensure systemd daemon is reloaded
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: Ensure Prometheus systemd service is started
      ansible.builtin.systemd_service:
        name: prometheus.service
        state: started

---
- name: (Deprecation) Catch and report renamed settings
  ansible.builtin.fail:
    msg: >-
      Your configuration contains a variable, which now has a different name.
      Please change your configuration to rename the variable (`{{ item.old }}` -> `{{ item.new }}`).
  when: "lookup('ansible.builtin.varnames', ('^' + item.old + '$'), wantlist=True) | length > 0"
  with_items:
    - { "old": "prometheus_process_default_arguments", "new": "prometheus_process_extra_arguments_default" }
    - { "old": "prometheus_process_arguments", "new": "prometheus_process_extra_arguments" }
    - { "old": "prometheus_basic_auth_enabled", "new": "prometheus_container_labels_metrics_middleware_basic_auth_enabled" }
    - { "old": "prometheus_basic_auth_username", "new": "<superseded by prometheus_container_labels_metrics_middleware_basic_auth_users>" }
    - { "old": "prometheus_basic_auth_password", "new": "<superseded by prometheus_container_labels_metrics_middleware_basic_auth_users>" }
    - { "old": "prometheus_http_header_content_permission_policy", "new": "prometheus_http_header_permissions_policy" }
    - { "old": "prometheus_container_image_force_pull", "new": "<removed> (the new community.docker.docker_image_pull module handles this natively)" }

- name: Fail if required Prometheus settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`).
  when: "lookup('vars', item, default='') | string | length == 0"
  with_items:
    - prometheus_identifier
    - prometheus_uid
    - prometheus_gid
    - prometheus_container_network

- name: Fail if required settings for Traefik labels are not defined
  ansible.builtin.fail:
    msg: >-
      You need to define prometheus_hostname to use Traefik labels.
  when: prometheus_container_labels_traefik_enabled and prometheus_hostname == ''

- name: Fail if Prometheus process arguments do not contain a configuration file argument
  ansible.builtin.fail:
    msg: >-
      The final list of Prometheus process arguments (`prometheus_process_extra_arguments`) does not contain a `--config.file` argument,
      which would cause Prometheus to fail to start (see https://github.com/mother-of-all-self-hosting/ansible-role-prometheus/issues/35).
      Since https://github.com/mother-of-all-self-hosting/ansible-role-prometheus/commit/9031043139274eeb395d6adc43c76197f7fef2f9,
      `prometheus_process_extra_arguments` holds the final list of process arguments, not just your extra ones.
      If you are redefining `prometheus_process_extra_arguments` (or `prometheus_process_extra_arguments_default`),
      make sure the final list still contains a `--config.file` argument.
      If you merely wish to pass extra arguments on top of the defaults,
      define them in `prometheus_process_extra_arguments_custom` instead.
  when: "'--config.file' not in prometheus_process_extra_arguments | join(' ')"
